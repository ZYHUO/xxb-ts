services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy volatile-lru --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  xxb:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts
      - ./sticker_assets:/app/sticker_assets
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
